<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客 | 联系</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <header class="site-header">
        <div class="container nav-wrap">
            <a href="HTML.html" class="logo">RUISPACE</a>
            <button class="menu-toggle" aria-label="切换导航菜单">☰</button>
            <nav class="site-nav" id="mainNav">
                <a href="HTML.html" data-nav="home">首页</a>
                <a href="about.html" data-nav="about">关于我</a>
                <a href="posts.html" data-nav="posts">文章</a>
                <a href="gallery.html" data-nav="gallery">相册</a>
                <a href="contact.html" data-nav="contact">联系</a>
            </nav>
        </div>
    </header>

    <main class="container section reveal">
        <h1>联系我</h1>
        <form id="contactForm" class="contact-form card">
            <label for="name">姓名</label>
            <input id="name" name="name" type="text" placeholder="请输入你的名字" required>

            <label for="email">邮箱</label>
            <input id="email" name="email" type="email" placeholder="your@email.com" required>

            <label for="message">留言</label>
            <textarea id="message" name="message" rows="5" placeholder="写下你的想法..." required></textarea>

            <button type="submit" class="btn">发送留言</button>
            <p id="formTip" class="form-tip"></p>
        </form>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© <span id="year"></span> 我的博客 · 用热爱连接世界</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
